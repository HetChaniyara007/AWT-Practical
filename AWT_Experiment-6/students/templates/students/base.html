<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Academy Dashboard{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --bg-surface: #141418;
            --bg-surface-hover: #1c1c22;
            --border-color: #33333e;
            --text-primary: #f0f0f0;
            --text-secondary: #888899;
            --accent-glow: rgba(0, 255, 157, 0.4);
            --accent-color: #00ff9d;
            --danger-color: #ff2a55;
            --warning-color: #f39c12;
            --success-color: #00e676;
            --sidebar-width: 250px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            background-image: linear-gradient(rgba(0, 255, 157, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 255, 157, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-primary);
            min-height: 100vh;
            margin: 0;
            display: flex;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-surface);
            border-right: 1px solid var(--border-color);
            position: fixed;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-align: center;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(0, 255, 157, 0.1);
            color: var(--accent-color);
        }

        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 40px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.02);
        }
        
        h1 {
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 1px;
            color: var(--text-primary);
        }

        .btn {
            display: inline-block;
            background: rgba(0, 255, 157, 0.1);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            text-align: center;
        }

        .btn:hover {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .btn-danger {
            background: rgba(255, 42, 85, 0.1);
            color: var(--danger-color);
            border-color: var(--danger-color);
        }

        .btn-danger:hover {
            background: var(--danger-color);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 42, 85, 0.4);
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        tr:hover {
            background: var(--bg-surface-hover);
        }

        .badge {
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-active { background: rgba(0, 230, 118, 0.1); color: var(--success-color); border: 1px solid var(--success-color); }
        .badge-suspended { background: rgba(255, 42, 85, 0.1); color: var(--danger-color); border: 1px solid var(--danger-color); }
        .badge-graduated { background: rgba(243, 156, 18, 0.1); color: var(--warning-color); border: 1px solid var(--warning-color); }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card h3 {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-top: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand">Academy</div>
        <a href="{% url 'student_list' %}" class="nav-link active">Dashboard</a>
        <a href="{% url 'student_create' %}" class="nav-link">Admit Student</a>
        <a href="/" class="nav-link">Settings</a>
    </div>

    <div class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
