{% extends 'students/base.html' %}

{% block content %}
<div class="header-actions">
    <h1>Delete Student</h1>
    <a href="{% url 'student_list' %}" class="btn">Cancel</a>
</div>

<div class="empty-state">
    <h2 style="color: var(--danger-color);">Are you sure?</h2>
    <p>Do you really want to delete the student: <strong>{{ student.first_name }} {{ student.last_name }}</strong>?</p>
    <form method="post" style="margin-top: 30px;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'student_list' %}" class="btn" style="margin-left: 10px;">Cancel</a>
    </form>
</div>
{% endblock %}
