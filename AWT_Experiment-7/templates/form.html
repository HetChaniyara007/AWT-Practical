{% extends 'base.html' %}

{% block content %}
<div class="header-actions">
    <div>
        <h1 style="margin-bottom: 5px;">{% if student %}Edit System Record{% else %}Enroll New Student{% endif %}</h1>
        <p style="color: var(--text-secondary); margin: 0; font-size: 0.95rem;">Please ensure all logistical data is accurate.</p>
    </div>
    <a href="/" class="btn btn-secondary">Cancel</a>
</div>

<form method="POST" style="max-width: 600px; margin: 0 auto;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="form-group">
            <label for="first_name">First Name</label>
            <input type="text" id="first_name" name="first_name" class="form-control" placeholder="John" value="{{ student.first_name if student else '' }}" required>
        </div>
        <div class="form-group">
            <label for="last_name">Last Name</label>
            <input type="text" id="last_name" name="last_name" class="form-control" placeholder="Doe" value="{{ student.last_name if student else '' }}" required>
        </div>
    </div>
    
    <div class="form-group">
        <label for="student_id">Official Student ID (Roll No.)</label>
        <input type="text" id="student_id" name="student_id" class="form-control" placeholder="e.g. CS-2026-001" value="{{ student.student_id if student else '' }}" required>
    </div>
    
    <div class="form-group">
        <label for="department">Department</label>
        <select id="department" name="department" class="form-control" required>
            <option value="Computer Science" {% if student and student.department == 'Computer Science' %}selected{% endif %}>Computer Science</option>
            <option value="Mechanical Engineering" {% if student and student.department == 'Mechanical Engineering' %}selected{% endif %}>Mechanical Engineering</option>
            <option value="Electrical Engineering" {% if student and student.department == 'Electrical Engineering' %}selected{% endif %}>Electrical Engineering</option>
            <option value="Business Administration" {% if student and student.department == 'Business Administration' %}selected{% endif %}>Business Administration</option>
            <option value="Arts & Humanities" {% if student and student.department == 'Arts & Humanities' %}selected{% endif %}>Arts & Humanities</option>
        </select>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="form-group">
            <label for="blood_group">Blood Group</label>
            <select id="blood_group" name="blood_group" class="form-control" required>
                <option value="A+" {% if student and student.blood_group == 'A+' %}selected{% endif %}>A+</option>
                <option value="A-" {% if student and student.blood_group == 'A-' %}selected{% endif %}>A-</option>
                <option value="B+" {% if student and student.blood_group == 'B+' %}selected{% endif %}>B+</option>
                <option value="B-" {% if student and student.blood_group == 'B-' %}selected{% endif %}>B-</option>
                <option value="O+" {% if student and student.blood_group == 'O+' %}selected{% endif %}>O+</option>
                <option value="O-" {% if student and student.blood_group == 'O-' %}selected{% endif %}>O-</option>
                <option value="AB+" {% if student and student.blood_group == 'AB+' %}selected{% endif %}>AB+</option>
                <option value="AB-" {% if student and student.blood_group == 'AB-' %}selected{% endif %}>AB-</option>
            </select>
        </div>
        <div class="form-group">
            <label for="emergency_contact">Emergency Contact #</label>
            <input type="text" id="emergency_contact" name="emergency_contact" class="form-control" placeholder="+1 (555) 000-0000" value="{{ student.emergency_contact if student else '' }}" required>
        </div>
    </div>
    
    <button type="submit" class="btn" style="width: 100%; margin-top: 20px; font-size: 1.05rem; padding: 14px;">Save Official Record</button>
</form>
{% endblock %}
